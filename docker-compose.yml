version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - USE_PROXY=${USE_PROXY}
      - PROXY_LIST=${PROXY_LIST}
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS}
      - MAX_PAGES_PER_TASK=${MAX_PAGES_PER_TASK}
      - DATABASE_URL=sqlite:///./webscribe.db
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data: